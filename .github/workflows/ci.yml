name: CI Quality Check

on:
  pull_request:
    branches: [main]

jobs:
  check-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Lint (Style Check)
        run: npm run lint

      - name: Run Build (Safety Check)
        run: npm run build